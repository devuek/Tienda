<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta — TiendaSV</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:     #0d0f1a;
            --surface:rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.09);
            --cyan:   #00f0ff;
            --purple: #9d00ff;
            --text:   #ffffff;
            --muted:  #a0a5b5;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 45px 45px;
            width: 100%;
            max-width: 460px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 1.9rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 6px;
            color: var(--cyan);
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 0.88rem;
            margin-bottom: 35px;
        }

        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 7px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 0.95rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }
        input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(0,240,255,0.1);
        }

        .hint {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 5px;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: var(--purple);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
            margin-top: 10px;
        }
        .btn-register:hover  { opacity:0.9; transform:translateY(-2px); }
        .btn-register:active { transform:scale(0.98); }

        .terms {
            font-size: 0.75rem;
            color: var(--muted);
            text-align: center;
            margin-top: 16px;
            line-height: 1.6;
        }
        .terms a { color: var(--cyan); text-decoration: none; }
        .terms a:hover { text-decoration: underline; }

        .login-link {
            display: block;
            text-align: center;
            margin-top: 22px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }
        .login-link:hover { color: var(--text); }
        .login-link:hover strong { color: var(--cyan); }

        /* Estilos Ver Contraseña */
        .password-field-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-field-container input {
            padding-right: 55px !important;
        }
        .btn-toggle-password {
            position: absolute;
            right: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 0;
        }
        .btn-toggle-password:hover {
            border-color: var(--cyan);
            color: var(--text);
            background: rgba(0,240,255,0.05);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">TiendaSV.</div>
        <p class="subtitle">Crea tu cuenta y empieza a comprar en El Salvador</p>

        <div th:if="${errorMsg}" style="background:rgba(255,82,82,0.1); color:#ff5252; padding:15px; border-radius:12px; font-size:0.85rem; margin-bottom:20px; border:1px solid rgba(255,82,82,0.2); text-align:center;">
            <span th:text="${errorMsg}">Error</span>
        </div>

        <form th:action="@{/registro}" method="post">
            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" name="username"
                       placeholder="Ej: juan_sv" required autofocus>
                <p class="hint">Solo letras, números y guiones bajos.</p>
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email"
                       placeholder="tucorreo@ejemplo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-field-container">
                    <input type="password" id="password" name="password"
                           placeholder="Mínimo 8 caracteres" required minlength="8">
                    <button type="button" class="btn-toggle-password" onclick="togglePass('password', this)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar contraseña</label>
                <div class="password-field-container">
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           placeholder="Repite tu contraseña" required>
                    <button type="button" class="btn-toggle-password" onclick="togglePass('confirmPassword', this)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-register">Crear mi cuenta</button>
        </form>

        <p class="terms">
            Al registrarte, aceptas nuestros
            <a href="#">Términos de Servicio</a> y
            <a href="#">Política de Privacidad</a>.
        </p>

        <a href="/login" class="login-link">
            ¿Ya tienes cuenta? <strong>Inicia sesión aquí →</strong>
        </a>
    </div>

    <script>
        function togglePass(inputId, btn) {
            const passInput = document.getElementById(inputId);
            const isPassword = passInput.type === 'password';
            
            passInput.type = isPassword ? 'text' : 'password';
            
            // Cambiar icono SVG
            if (isPassword) {
                btn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                `;
            } else {
                btn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                `;
            }
        }
    </script>
</body>
</html>
